services:
  mock:
    image: python:3.12-slim
    working_dir: /mock
    command: python server.py
    volumes:
      - ./mock:/mock
    expose:
      - "8080"

  subscriber:
    build: .
    command: ["python", "run_subscriber.py", "/config/feeds.yaml"]
    volumes:
      - ./config:/config:ro
      - ./data/subscriptions:/subscriptions
      - ./src:/app/src
    environment:
      - PODDERTON_PATH=/
    depends_on:
      - mock

  generator:
    build: .
    command: ["python", "run_generator.py", "/config/feeds.yaml"]
    ports:
      - "9988:9988"
    volumes:
      - ./config:/config:ro
      - ./data/subscriptions:/subscriptions:ro
      - ./data/feeds:/feeds
      - ./src:/app/src
    environment:
      - PODDERTON_PATH=/
    depends_on:
      - mock
