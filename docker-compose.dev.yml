services:
  mock:
    image: python:3.12-slim
    working_dir: /mock
    command: python server.py
    volumes:
      - ./mock:/mock
    expose:
      - "8080"

  podderton:
    build: .
    ports:
      - "9988:9988"
    volumes:
      - ./config:/config
      - ./podcasts:/podcasts
      - ./src:/app/src
    depends_on:
      - mock
